<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        function setViewport() {
          var isMobileDevice = /Mobi|Android/i.test(navigator.userAgent) || ('ontouchstart' in window && navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
          var metaViewport = document.querySelector('meta[name=viewport]');
          if (!metaViewport) {
            metaViewport = document.createElement('meta');
            metaViewport.name = "viewport";
            document.head.appendChild(metaViewport);
          }
          if (isMobileDevice) {
            // Get physical dimensions (screen.width/height is more reliable for orientation independent physical pixels)
            var w = window.outerWidth > 0 ? window.outerWidth : window.screen.width;
            var h = window.outerHeight > 0 ? window.outerHeight : window.screen.height;
            var shortEdge = Math.min(w, h);
            var isTablet = shortEdge >= 600;
            // Robust portrait detection that works reliably during fullscreen rotation
            var isPortrait = false;
            if (window.screen && window.screen.orientation && window.screen.orientation.type) {
              isPortrait = window.screen.orientation.type.indexOf('portrait') !== -1;
            } else {
              isPortrait = window.innerHeight > window.innerWidth;
            }

            // Bypassing meta viewport logical width changes prevents Chrome from selectively resetting it across contexts
            metaViewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');

            if (isTablet) {
              document.documentElement.style.zoom = "";
            } else if (isPortrait) {
              var minDim = Math.min(w, h);
              var portraitZoom = minDim / 500;
              document.documentElement.style.zoom = portraitZoom < 1 ? portraitZoom.toString() : "";
            } else {
              var maxDim = Math.max(w, h);
              var minDim = Math.min(w, h);
              var aspect = maxDim / minDim;
              var targetLogicalHeight = 650;
              var logicalWidth = Math.max(1280, Math.round(targetLogicalHeight * aspect));
              
              var landscapeZoom = maxDim / logicalWidth;
              document.documentElement.style.zoom = landscapeZoom.toString();
            }
          } else {
            metaViewport.setAttribute('content', 'width=device-width, initial-scale=1.0');
            document.documentElement.style.zoom = "";
          }
        }
        setViewport();
        window.addEventListener('resize', setTimeout.bind(null, setViewport, 200));
        window.addEventListener('fullscreenchange', setTimeout.bind(null, setViewport, 300));
        window.addEventListener('orientationchange', setTimeout.bind(null, setViewport, 300));
      })();
    </script>
